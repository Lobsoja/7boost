<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7BOOST. — Email Verified</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A0A0A;
            color: #E8E8E8;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #E8E8E8;
            margin-bottom: 40px;
        }
        .icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #1C1C1C;
            border: 1px solid #2A2A2A;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .icon svg { width: 24px; height: 24px; }
        h1 {
            font-family: 'DM Sans', sans-serif;
            font-size: 18px;
            font-weight: 400;
            color: #E8E8E8;
            margin-bottom: 12px;
        }
        p {
            font-size: 13px;
            font-weight: 300;
            color: #666;
            line-height: 1.7;
            margin-bottom: 32px;
        }
        .divider {
            width: 1px;
            height: 40px;
            background: #1E1E1E;
            margin: 0 auto 32px;
        }
        .back-link {
            font-size: 11px;
            font-weight: 300;
            color: #444;
            text-decoration: none;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.15s;
        }
        .back-link:hover { color: #E8E8E8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">7BOOST.</div>
        <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 13l4 4L19 7" stroke="#E8E8E8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h1>Your email has been verified.</h1>
        <p>Your account is now active. Open the 7BOOST. extension in your browser and sign in to start boosting your prompts.</p>
        <div class="divider"></div>
        <a href="https://7boost.io" class="back-link">← Back to 7boost.io</a>
    </div>
</body>
</html>
